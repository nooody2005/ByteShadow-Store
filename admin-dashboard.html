<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteShadow Store</title>
    <!-- Main Template css file -->
    <link rel="stylesheet" href="css/overview.css"/>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/details.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css"/>
    <!-- Font Awesome library -->
    <link rel="stylesheet" href="css/all.min.css"/>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Start Header  -->

   <div class="header">
        <div class="container">

            <div class="logo">
                <img src="images/" alt="">
                <h3>BYTE SHADOW</h3>
            </div>
           <div class="links">
                <div class="auth">
                    <a href="#">Login</a>
                    <a href="#">Sign Up</a>
                </div>
                <div class="menu">
                    <span class="icons">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                    <ul>
                        <li><a href="#home">Home</a> </li>
                        <li><a href="#gallery">Gallery</a> </li>
                        <li><a href="#contact us">Contact us</a> </li>
                    </ul>
                </div>
               </div>
           </div>
        </div>
     <!-- End Header  -->
        
        <section class="dashboard">

    <div class="container">

        <div class="dashboard-box">

            <h2>Add New Painting</h2>

            <form>

                <div class="form-group">
                    <label>Painting Name</label>
                    <input type="text">
                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Type</label>

                        <select>

                            <option>Expressive</option>
                            <option>Nature</option>
                            <option>Romantic</option>
                            <option>Portrait</option>

                        </select>

                    </div>

                    <div class="form-group">
                        <label>Size</label>
                        <input type="text">
                    </div>

                </div>

                <div class="form-group">

                    <label>Brief Paragraph</label>

                    <textarea rows="3"></textarea>

                </div>

                <div class="form-group">

                    <label>Description</label>

                    <textarea rows="8"></textarea>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Starting Price</label>
                        <input type="number">
                    </div>

                    <div class="form-group">
                        <label>Current Price</label>
                        <input type="number">
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Auction Ends</label>
                        <input type="datetime-local">
                    </div>

                    <div class="form-group">

                        <label>Status</label>

                        <select>

                            <option>active</option>
                            <option>sold</option>
                            <option>hidden</option>

                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label>Main Image</label>

                    <input type="file">

                </div>

                <div class="form-group">

                    <label>Decoration Images</label>

                    <input type="file" multiple>

                </div>

                <div class="form-group">

                    <label>Stage Images</label>

                    <input type="file" multiple>

                </div>

                <button class="dashboard-btn">

                    Publish Painting

                </button>

            </form>

        </div>

    </div>

</section>




        <!-- Start Footer  -->
        <div class="footer">
            <div class="container">
                <img src="images/logo.png" alt="Logo">
                <p>We Are Social</p>
                <div class="social-icons">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-twitter"></i>
                    <i class="fas fa-home"></i>
                    <i class="fab fa-linkedin"></i>
                </div>
                <p class="copyright">&copy; 2026 <span> All Right Reserved </span></p>
            </div>
        </div>
    <!-- End Footer  -->


    </body>
</html>
