<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteShadow Store</title>
    <!-- Main Template css file -->
    <link rel="stylesheet" href="css/overview.css"/>
    <link rel="stylesheet" href="css/details.css">
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css"/>
    <!-- Font Awesome library -->
    <link rel="stylesheet" href="css/all.min.css"/>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Start Header  -->

   <div class="header">
        <div class="container">

            <div class="logo">
                <img src="images/" alt="">
                <h3>BYTE SHADOW</h3>
            </div>
           <div class="links">
                <div class="auth">
                    <a href="#">Login</a>
                    <a href="#">Sign Up</a>
                </div>
                <div class="menu">
                    <span class="icons">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                    <ul>
                        <li><a href="#home">Home</a> </li>
                        <li><a href="#gallery">Gallery</a> </li>
                        <li><a href="#contact us">Contact us</a> </li>
                    </ul>
                </div>
               </div>
           </div>
        </div>
     <!-- End Header  -->
      <!-- start Painting  -->
        <div class="painting">
            <div class="container">
                <div class="painting-content">
                    <div class="image">
                        <img src="images/1.jpg" alt="">
                    </div>
                    <div class="datails">
                        <h1 class="painting-Name">Painting Name</h1>
                        <p class="breif-overview">Lorem ipsum dolor sit amet consectetur hbvjnvkva habivihbiayb..</p>
                        <!-- <div class="for-sale1"> -->
                        <div class="sale-section">
                            
                            <div class="price">
                                <h3>Current Highest Bid</h3>
                                <span class="current-price">
                                    <span class="number">120</span>
                                    <span class="currency">$</span>
                                </span>
                                <div class="bid-box">
                                    <label>Your Bid</label>
    
                                    <input
                                        type="number"
                                        class="bid-input"
                                        value="120"
                                        min="121"
                                        step="1">
                                </div>
    
                                <button class="bid-btn">
                                    Place Bid
                                </button>
                            </div>


                           <div class="info">

                                <div class="size">
                                    <span class="title">
                                        <i class="fas fa-ruler-combined"></i>
                                        Size
                                    </span>
                                    <span class="value">20 * 30 cm</span>
                                </div>

                                <div class="date">
                                    <span class="title">
                                        <i class="far fa-calendar-alt"></i>
                                        Created
                                    </span>
                                    <span class="value">15 Jul 2025</span>
                                </div>

                                <div class="auction-info">
                                    <span class="title">
                                        <i class="fas fa-gavel"></i>
                                        Auction Ends
                                    </span>
                                    <span class="value">30 Jul 2026</span>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
             </div>
        </div>
       
        <!-- End Painting -->


            <!-- Start Footer  -->
             <div class="footer">
                <div class="container">
                    <img src="images/logo.png" alt="Logo">
                    <p>We Are Social</p>
                    <div class="social-icons">
                        <i class="fab fa-facebook-f"></i>
                        <i class="fab fa-twitter"></i>
                        <i class="fas fa-home"></i>
                        <i class="fab fa-linkedin"></i>
                    </div>
                    <p class="copyright">&copy; 2025 <span> All Right Reserved </span></p>
                </div>
             </div>
        <!-- End Footer  -->


</body>
</html>
